name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # A fine-grained PAT (RELEASE_PLEASE_TOKEN) lets the created tag fire the
      # existing tag-triggered build. Falls back to GITHUB_TOKEN (opens PRs +
      # cuts tags, but won't trigger the downstream build) so it never hard-fails.
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
